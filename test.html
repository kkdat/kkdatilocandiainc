<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT Ilocandia Inc - Social Hub</title>
    <link rel="icon" type="image/png" href="LOGO.png">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Thumbnail Grid Styles */
        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .thumb-item {
            aspect-ratio: 1/1;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .thumb-item:hover {
            transform: scale(1.05);
            border-color: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
        }

        /* Popup Carousel Overlay */
        #galleryModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .modal-carousel-container {
            width: 90%;
            max-width: 800px;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
        }

        .modal-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-slide img {
            max-height: 70vh;
            width: auto;
            object-fit: contain;
            border-radius: 12px;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 50%;
            color: white;
            transition: background 0.3s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body class="text-white py-8 px-4">

    <div class="max-w-5xl mx-auto text-center mb-12">
        <div class="w-24 h-24 bg-white/10 rounded-full mx-auto mb-4 p-1 border border-white/20 overflow-hidden">
            <img src="CURRIMAO.PNG" class="w-full h-full object-cover rounded-full">
        </div>
        <h1 class="text-3xl md:text-5xl font-black">KKDAT Ilocandia Inc.</h1>
    </div>

    <div class="max-w-5xl mx-auto">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-4">
            <span class="h-px flex-1 bg-white/20"></span>
            Event Gallery
            <span class="h-px flex-1 bg-white/20"></span>
        </h2>

        <div class="glass-card p-6 rounded-[2.5rem]">
            <div class="thumb-grid" id="mainGrid">
                </div>
        </div>
    </div>

    <div id="galleryModal">
        <div class="absolute top-6 right-6 flex gap-4 z-50">
            <button onclick="toggleAutoplay()" id="playPauseBtn" class="text-white bg-white/10 px-4 py-2 rounded-full border border-white/20 hover:bg-white/20">
                <i class="fa-solid fa-pause"></i>
            </button>
            <button onclick="closeGallery()" class="text-white text-3xl hover:text-red-400">&times;</button>
        </div>

        <div class="modal-carousel-container glass-card p-4">
            <div class="modal-track" id="modalTrack">
                </div>

            <button onclick="prevSlide()" class="nav-btn left-4"><i class="fa-solid fa-chevron-left"></i></button>
            <button onclick="nextSlide()" class="nav-btn right-4"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        
        <p id="imageCaption" class="mt-6 text-blue-200 font-bold tracking-widest uppercase text-sm"></p>
    </div>

    <script>
        // Gallery Data Array
        const galleryImages = [
            { src: 'assets/ELECTION/ELECT1.jpg', title: 'ELECTION 2026' },
            { src: 'assets/ELECTION/ELECT2.jpg', title: 'ELECTION 2026' },
            { src: 'assets/OPLAN KRUS/OK11.jpg', title: 'OPLAN KRUS' },
            { src: 'assets/OPLAN KRUS/OK2.jpg', title: 'OPLAN KRUS' },
            { src: 'assets/OPLAN BALLAAG/OB1.jpg', title: 'OPLAN BALLAAG' },
            { src: 'assets/OPLAN BALLAAG/OB2.jpg', title: 'OPLAN BALLAAG' },
            { src: 'assets/ELECTION/ELECT3.jpg', title: 'ELECTION 2026' },
            { src: 'assets/OPLAN KRUS/OK3.jpg', title: 'OPLAN KRUS' }
        ];

        let currentIndex = 0;
        let autoPlayInterval;
        let isPlaying = true;

        const grid = document.getElementById('mainGrid');
        const track = document.getElementById('modalTrack');
        const modal = document.getElementById('galleryModal');
        const caption = document.getElementById('imageCaption');

        // 1. Initialize Thumbnails and Modal Slides
        function initGallery() {
            galleryImages.forEach((img, idx) => {
                // Add to Grid
                const thumb = document.createElement('div');
                thumb.className = 'thumb-item';
                thumb.innerHTML = `<img src="${img.src}" class="w-full h-full object-cover" loading="lazy">`;
                thumb.onclick = () => openGallery(idx);
                grid.appendChild(thumb);

                // Add to Modal Track
                const slide = document.createElement('div');
                slide.className = 'modal-slide';
                slide.innerHTML = `<img src="${img.src}">`;
                track.appendChild(slide);
            });
        }

        // 2. Open Gallery & Start Carousel
        function openGallery(index) {
            currentIndex = index;
            modal.style.display = 'flex';
            updateCarousel();
            startAutoplay();
            document.body.style.overflow = 'hidden'; // Prevent scroll
        }

        function closeGallery() {
            modal.style.display = 'none';
            stopAutoplay();
            document.body.style.overflow = 'auto';
        }

        // 3. Carousel Logic
        function updateCarousel() {
            const offset = -currentIndex * 100;
            track.style.transform = `translateX(${offset}%)`;
            caption.innerText = galleryImages[currentIndex].title;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            updateCarousel();
        }

        // 4. Autoplay Logic
        function startAutoplay() {
            stopAutoplay(); // Clear existing
            isPlaying = true;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fa-solid fa-pause"></i>';
            autoPlayInterval = setInterval(nextSlide, 3000); // Change image every 3 seconds
        }

        function stopAutoplay() {
            clearInterval(autoPlayInterval);
            isPlaying = false;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fa-solid fa-play"></i>';
        }

        function toggleAutoplay() {
            isPlaying ? stopAutoplay() : startAutoplay();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'flex') {
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'Escape') closeGallery();
            }
        });

        window.onload = initGallery;
    </script>
</body>
</html>
