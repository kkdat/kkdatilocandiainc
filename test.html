<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKDAT Ilocandia Inc - Social Hub</title>
    <link rel="icon" type="image/png" href="LOGO.png">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #60a5fa 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* NEW: Thumbnail Grid Styles */
        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
        .thumb-item {
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .thumb-item:hover { transform: scale(1.05); border-color: #60a5fa; }

        /* NEW: Popup Carousel Styles */
        #galleryModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 10, 0.95);
            backdrop-filter: blur(15px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-container {
            width: 90%;
            max-width: 900px;
            position: relative;
            overflow: hidden;
        }
        .modal-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .modal-slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-slide img {
            max-height: 75vh;
            width: auto;
            border-radius: 1rem;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .video-thumbnail { aspect-ratio: 16 / 9; object-fit: cover; }
    </style>
</head>
<body class="text-white py-8 md:py-12 px-4 sm:px-6">

    <div id="galleryModal">
        <button onclick="closeGallery()" class="absolute top-6 right-8 text-white text-4xl z-50 hover:text-red-400 transition-colors">&times;</button>
        
        <div class="modal-container glass-card p-4 rounded-[2rem]">
            <div id="modalTrack" class="modal-track">
                </div>
            
            <button onclick="prevSlide()" class="absolute left-6 top-1/2 -translate-y-1/2 bg-white/10 p-4 rounded-full hover:bg-white/20">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button onclick="nextSlide()" class="absolute right-6 top-1/2 -translate-y-1/2 bg-white/10 p-4 rounded-full hover:bg-white/20">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
        <p id="modalCaption" class="mt-6 font-bold tracking-widest uppercase text-blue-200"></p>
    </div>

            </div>
            <h1 class="text-3xl md:text-5xl font-black text-white tracking-tight drop-shadow-md">KKDAT Ilocandia Incorporated</h1>

        <div class="mb-12 relative">

                <span class="h-px flex-1 bg-white/10"></span> Featured Activity <span class="h-px flex-1 bg-white/10"></span>
            </h2>
            <div class="flex justify-center">
                <div class="w-full max-w-2xl glass-card p-3 rounded-[3rem] overflow-hidden shadow-2xl relative">
                    <div class="relative group overflow-hidden rounded-[2.5rem] h-full min-h-[300px] border-2 border-white/10">
                        <img src="assets/PROGRESS.png" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-blue-900/90 via-transparent to-transparent flex flex-col justify-end p-8">

                            <p class="text-blue-100 text-xs font-medium">Naragsak a isasangbay iti KKDAT Ilocandia Inc Social Hub!</p>

            </div>
        </div>

        <div class="glass-card mb-20 p-5 rounded-[2.5rem] relative z-10">

                        <a href="mailto:kkdatcurrimao@gmail.com" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-emerald-500 transition-all"><i class="fa-solid fa-envelope"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-20">
            <h2 class="text-xl font-bold text-white mb-8 flex items-center gap-4">
                <span class="h-0.5 flex-1 bg-white/20 rounded-full"></span> Event Gallery <span class="h-0.5 flex-1 bg-white/20 rounded-full"></span>
            </h2>
            <div class="glass-card p-6 rounded-[2.5rem]">
                <div id="thumbnailGrid" class="thumb-grid">

        </div>

        <div class="space-y-6 relative pb-20">
             <h2 class="text-xl font-bold text-white px-2 flex items-center gap-4 relative z-10">
                <span class="h-0.5 flex-1 bg-white/20 rounded-full"></span> Latest Content <span class="h-0.5 flex-1 bg-white/20 rounded-full"></span>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">

        <footer class="text-center py-12 opacity-60">
            <p class="text-[10px] uppercase tracking-[0.4em] font-bold text-white">KKDAT II Currimao • Ilocos Norte</p>
        </footer>
    </div>

    <script>
        // Gallery Data
        const galleryData = [
            { src: 'assets/ELECTION/ELECT1.jpg', tag: 'Election 2026' },
            { src: 'assets/ELECTION/ELECT2.jpg', tag: 'Election 2026' },
            { src: 'assets/OPLAN KRUS/OK11.jpg', tag: 'Oplan Krus' },
            { src: 'assets/OPLAN KRUS/OK2.jpg', tag: 'Oplan Krus' },
            { src: 'assets/OPLAN BALLAAG/OB1.jpg', tag: 'Oplan Ballaag' },
            { src: 'assets/OPLAN BALLAAG/OB2.jpg', tag: 'Oplan Ballaag' },
            { src: 'assets/ELECTION/ELECT3.jpg', tag: 'Election 2026' },
            { src: 'assets/OPLAN KRUS/OK3.jpg', tag: 'Oplan Krus' }
        ];

        let currentIndex = 0;
        let autoPlayInterval;

        // Initialize Gallery
        const grid = document.getElementById('thumbnailGrid');
        const track = document.getElementById('modalTrack');

        galleryData.forEach((img, idx) => {
            // Create Thumbnails
            const thumb = document.createElement('div');
            thumb.className = 'thumb-item';
            thumb.innerHTML = `<img src="${img.src}" class="w-full h-full object-cover">`;
            thumb.onclick = () => openGallery(idx);
            grid.appendChild(thumb);

            // Create Modal Slides
            const slide = document.createElement('div');
            slide.className = 'modal-slide';
            slide.innerHTML = `<img src="${img.src}">`;
            track.appendChild(slide);
        });

        function openGallery(index) {
            currentIndex = index;
            document.getElementById('galleryModal').style.display = 'flex';
            updateSlide();
            startAutoplay();
        }

        function closeGallery() {
            document.getElementById('galleryModal').style.display = 'none';
            clearInterval(autoPlayInterval);
        }

        function updateSlide() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            document.getElementById('modalCaption').innerText = galleryData[currentIndex].tag;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % galleryData.length;
            updateSlide();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length;
            updateSlide();
        }

        function startAutoplay() {
            clearInterval(autoPlayInterval);
            autoPlayInterval = setInterval(nextSlide, 3000);
        }
    </script>
</body>
</html>
